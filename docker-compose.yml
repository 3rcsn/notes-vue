services:
  mongo:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      -   mongo_data:/data/db
  api:
    build: .
    container_name: notes_api
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/notes
    depends_on:
      - mongo
volumes:
  mongo_data: